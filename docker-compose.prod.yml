# =============================================================================
# SIDHKOFED CMS — Production Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Build and push images (see .github/workflows/release.yml or build locally):
#        docker build -t ghcr.io/sidhkofed/api:latest .
#        docker build -t ghcr.io/sidhkofed/admin:latest ./admin
#        docker build -t ghcr.io/sidhkofed/web:latest ./web
#
#   2. Create and populate the environment file:
#        cp .env.example .env.prod
#        # Edit .env.prod with production values
#
#   3. Place TLS certificates at:
#        nginx/ssl/fullchain.pem
#        nginx/ssl/privkey.pem
#      (Use Certbot / Let's Encrypt, or a commercial certificate authority.)
#
# Secrets: use Docker secrets or an external vault (HashiCorp Vault, AWS SSM,
# GCP Secret Manager) in production. Never commit .env.prod.
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sidhkofed-postgres
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sidhkofed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sidhkofed_cms}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db/01-init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sidhkofed} -d ${POSTGRES_DB:-sidhkofed_cms}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    # Never expose the database port to the host in production.
    # If you need psql access, use: docker compose exec postgres psql ...

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sidhkofed-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly yes
      - --appendfsync everysec
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      # Require a password in production:
      # - --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - backend
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/sidhkofed/api:${IMAGE_TAG:-latest}
    container_name: sidhkofed-api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      # Internal service URLs (Docker network names)
      DATABASE_URL: postgresql://${POSTGRES_USER:-sidhkofed}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sidhkofed_cms}?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      # Mount local media storage (only for STORAGE_PROVIDER=local)
      - media:/app/storage
    networks:
      - backend
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/ready']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  # ── Migration job (runs once, then exits) ───────────────────────────────────
  # Run before starting the api for the first time, or after pulling a new image:
  #   docker compose -f docker-compose.prod.yml run --rm migrate
  migrate:
    image: ghcr.io/sidhkofed/api:${IMAGE_TAG:-latest}
    container_name: sidhkofed-migrate
    restart: "no"
    env_file: .env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-sidhkofed}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sidhkofed_cms}?schema=public
    command: ['npx', 'prisma', 'migrate', 'deploy']
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  # ── Admin CMS ───────────────────────────────────────────────────────────────
  admin:
    image: ghcr.io/sidhkofed/admin:${IMAGE_TAG:-latest}
    container_name: sidhkofed-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      # The admin Next.js app uses this for SSR fetch calls.
      BACKEND_ORIGIN: http://api:4000
    networks:
      - backend
      - proxy
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Public Website ──────────────────────────────────────────────────────────
  web:
    image: ghcr.io/sidhkofed/web:${IMAGE_TAG:-latest}
    container_name: sidhkofed-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3002"
      # SSR fetch calls go directly to the api container (no browser involved).
      BACKEND_ORIGIN: http://api:4000
    networks:
      - backend
      - proxy
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sidhkofed-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certificates (provision before first run):
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Serve local media files directly (remove if using S3):
      - media:/app/storage:ro
    networks:
      - proxy
    depends_on:
      - api
      - admin
      - web
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  media:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true          # No direct internet access from backend containers
  proxy:
    driver: bridge
