# =============================================================================
# SIDHKOFED CMS — Nginx Production Configuration
# =============================================================================
# Architecture:
#   Client → Nginx (80/443) → api (4000) | admin (3001) | web (3002)
#
# Routing strategy (path-based for single-domain deployment):
#   /api/v1/*            → Express API backend
#   /live, /ready, /health → Express health endpoints
#   /files/*             → local media files (served directly by Nginx)
#   /admin/*             → Admin CMS (Next.js on 3001)
#   /                    → Public website (Next.js on 3002)
#
# For multi-domain deployments (recommended for production):
#   api.example.com      → api upstream
#   admin.example.com    → admin upstream
#   www.example.com      → web upstream
#   Adjust server_name blocks below accordingly.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time ua="$upstream_addr" us="$upstream_status" '
                    'ut="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 2048;
    server_tokens      off;            # hide Nginx version

    # Compression (Brotli preferred; gzip as fallback)
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/javascript application/json application/xml
                      application/rss+xml application/atom+xml image/svg+xml
                      font/woff font/woff2;

    # ── Client body limits (align with UPLOAD_MAX_REQUEST_MB=60) ─────────────
    client_max_body_size 64m;
    client_body_timeout  60s;

    # ── Proxy defaults ────────────────────────────────────────────────────────
    proxy_http_version         1.1;
    proxy_set_header Host      $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_buffering off;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Login endpoint: 5 req/15 min per IP (aligns with RATE_LIMIT_LOGIN_MAX).
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/m;
    # Public API: 60 req/min per IP (generous baseline; tighten for production).
    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
    # Enquiry submission: 5 req/hour per IP (matches ENQUIRY_RATELIMIT_PER_IP_HOUR).
    limit_req_zone $binary_remote_addr zone=enquiry:10m rate=5r/h;

    limit_req_status 429;

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream api_backend {
        server api:4000;
        keepalive 32;
    }
    upstream admin_frontend {
        server admin:3001;
        keepalive 16;
    }
    upstream web_frontend {
        server web:3002;
        keepalive 16;
    }

    # ── Security header map ───────────────────────────────────────────────────
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'";
    }

    # ── HTTP → HTTPS redirect (enable when TLS is configured) ─────────────────
    # server {
    #     listen 80 default_server;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main server block ──────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        # listen 443 ssl http2;
        server_name _;

        # ── TLS (uncomment and configure for production HTTPS) ───────────────
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        # ssl_prefer_server_ciphers off;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;
        # ssl_stapling        on;
        # ssl_stapling_verify on;

        # ── Hardened security headers (applied to all responses) ─────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header X-DNS-Prefetch-Control off always;

        # ── Operational probes (no rate limit — consumed by orchestrators) ────
        location ~ ^/(live|ready|health)$ {
            proxy_pass http://api_backend;
            access_log off;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            # Apply tighter limit to auth endpoints.
            location /api/v1/auth/login {
                limit_req zone=login burst=3 nodelay;
                proxy_pass http://api_backend;
            }
            location /api/v1/public/enquiries {
                limit_req zone=enquiry burst=2 nodelay;
                proxy_pass http://api_backend;
            }

            proxy_pass http://api_backend;
        }

        # ── Local media files (only used for local storage provider) ─────────
        # When STORAGE_PROVIDER=s3, remove this block; media is served by S3/CDN.
        location /files/ {
            alias /app/storage/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header X-Content-Type-Options nosniff;
            # Deny execution of uploaded scripts (defence-in-depth).
            add_header Content-Security-Policy "default-src 'none'; img-src 'self'; style-src 'unsafe-inline'; sandbox";
        }

        # ── Admin CMS ─────────────────────────────────────────────────────────
        # Prefix the admin CMS under /admin; adjust to a subdomain in production.
        location /admin/ {
            rewrite ^/admin(/.*)$ $1 break;
            proxy_pass http://admin_frontend;

            # WebSocket support for Next.js HMR in development.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Next.js static assets (admin) ─────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://admin_frontend;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Public website (catch-all) ────────────────────────────────────────
        location / {
            proxy_pass http://web_frontend;

            # WebSocket support (Next.js ISR revalidation).
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Error pages ────────────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
